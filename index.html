playerX += 50

}
else{



}

 const blocke = document.createElement('div')

 if (abj === 100) {

}
    
    bconmpx = bconmpx+50
    abj = abj+1
    blockx = blockx+1

    if (coun !== "0"){

        for (let i = 0; i <coun; i++){

    masterGenerator(clas, cords, 0)

}

}


}
